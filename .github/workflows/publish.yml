name: Publish Release

on:
  release:
    types:
      - released
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      dotnet-version: "9.0.*"
      dotnet-target:  "net9.0"
  upload:
    runs-on: ubuntu-latest
    needs:
    - build
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
      with:
        name: build-artifact
    - name: Prepare GitHub Release assets
      run: |-
        for file in ./*; do
          md5sum ${file#./} >> ${file%.*}.md5
          sha256sum ${file#./} >> ${file%.*}.sha256
        done
        ls -l
    - name: Publish output artifacts
      id: publish-assets
      uses: softprops/action-gh-release@50195ba7f6f93d1ac97ba8332a178e008ad176aa
      with:
          prerelease: false
          fail_on_unmatched_files: true
          tag_name:  ${{ github.event.release.tag_name }}
          files: ./*
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  generate:
    runs-on: ubuntu-latest
    needs:
    - upload
    permissions:
      contents: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install pyyaml

    - name: Generate Manifest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: python .github/scripts/generate_manifest.py

    - name: Publish Manifest to Branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Move manifest out of the working tree to avoid deletion
        cp manifest.json ../manifest.json
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git checkout --orphan manifest-release
        git rm -rf .
        git clean -fdx
        
        # Move it back
        mv ../manifest.json ./manifest.json
        
        git add manifest.json
        git commit -m "Update plugin manifest [skip ci]" || echo "No changes to commit"
        git push origin HEAD:manifest-release --force
